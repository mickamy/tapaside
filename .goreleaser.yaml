version: 2

release:
  mode: replace
  replace_existing_artifacts: true

builds:
  - id: tapaside
    main: .
    binary: tapaside
    ldflags:
      - -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - ids:
      - tapaside
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

brews:
  - name: tapaside
    homepage: https://github.com/mickamy/tapaside
    description: Policy-enforcing database sidecar proxy for PostgreSQL, MySQL, and TiDB.
    license: Apache-2.0
    directory: Formula
    install: |
      bin.install "tapaside"
    repository:
      owner: mickamy
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Refactor
      regexp: '^.*?refactor(\(.+\))??!?:.+$'
      order: 3
    - title: Documentation
      regexp: '^.*?docs(\(.+\))??!?:.+$'
      order: 4
    - title: Others
      order: 999
  filters:
    exclude:
      - '^Merge pull request'
      - '^Merge branch'
